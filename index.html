<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volumetric Data Visualization</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- D3.js for visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <!-- Sortable.js for drag and drop functionality -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <!-- App styles -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- ===== CASE BROWSER (opening screen) ===== -->
    <div id="case-browser" class="container mx-auto px-6 py-8 max-w-6xl">
        <!-- CaseBrowser.js renders everything here -->
    </div>

    <!-- ===== DATA VIEW (shown when a case is selected) ===== -->
    <div id="data-view" class="hidden">

        <!-- Minimal header bar -->
        <div class="sticky top-0 z-30 bg-white/80 backdrop-blur-sm border-b border-gray-200/50">
            <div class="container mx-auto px-6 py-3 max-w-6xl flex items-center justify-between">
                <!-- Left: Back button + breadcrumb -->
                <div class="flex items-center gap-3">
                    <button id="back-to-browser" class="text-gray-400 hover:text-gray-700 transition-colors">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="text-sm text-gray-500">
                        <span id="breadcrumb-field" class="hover:text-indigo-600 cursor-pointer"></span>
                        <span class="mx-1 text-gray-300">/</span>
                        <span id="breadcrumb-scenario" class="hover:text-indigo-600 cursor-pointer"></span>
                        <span class="mx-1 text-gray-300">/</span>
                        <span id="breadcrumb-case" class="font-medium text-gray-800"></span>
                    </div>
                </div>

                <!-- Center: Case navigation -->
                <div class="flex items-center gap-2">
                    <button id="prev-case-btn" class="text-gray-400 hover:text-gray-700 p-1 transition-colors">
                        <i class="fas fa-chevron-left text-xs"></i>
                    </button>
                    <span id="case-title" class="text-sm font-medium text-gray-700"></span>
                    <button id="next-case-btn" class="text-gray-400 hover:text-gray-700 p-1 transition-colors">
                        <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>

                <!-- Right: Compare selector -->
                <div class="flex items-center gap-3">
                    <div id="compare-selector-container" class="flex items-center gap-2">
                        <label class="text-xs text-gray-400">Compare</label>
                        <select id="compare-case-selector" class="text-xs border-0 bg-gray-100 rounded-md px-2 py-1 focus:ring-1 focus:ring-indigo-500">
                            <option value="">None</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main content area -->
        <div class="container mx-auto px-6 py-6 max-w-6xl">

            <!-- Case metadata -->
            <div id="case-metadata-container" class="mb-6 flex items-center gap-6 text-sm text-gray-500">
                <div id="case-author-timestamp" class="flex items-center gap-4 cursor-pointer hover:text-gray-700 transition-colors">
                    <span class="flex items-center gap-1.5">
                        <i class="fas fa-user text-xs text-gray-400"></i>
                        <span class="author-name">&mdash;</span>
                    </span>
                    <span class="flex items-center gap-1.5">
                        <i class="fas fa-calendar-alt text-xs text-gray-400"></i>
                        <span class="timestamp-value">&mdash;</span>
                    </span>
                </div>
                <div id="case-description" class="text-gray-400 italic truncate"></div>
            </div>

            <!-- Pivot table section -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base font-semibold text-gray-800">Volumetrics</h2>
                    <div class="flex items-center gap-3">
                        <label class="inline-flex items-center cursor-pointer text-xs text-gray-500 hover:text-gray-700">
                            <input type="checkbox" id="hide-empty-toggle" class="sr-only peer">
                            <div class="relative w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-500"></div>
                            <span class="ml-1.5">Hide empty</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer text-xs text-gray-500 hover:text-gray-700">
                            <input type="checkbox" id="show-parameters-toggle" class="sr-only peer">
                            <div class="relative w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-500"></div>
                            <span class="ml-1.5">Parameters</span>
                        </label>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <div class="pivot-table-container">
                        <table id="pivot-table" class="min-w-full divide-y divide-gray-200 table-auto">
                            <thead class="bg-gray-50/50" id="pivot-headers"></thead>
                            <tbody class="divide-y divide-gray-100" id="pivot-body"></tbody>
                        </table>
                    </div>
                    <div style="display:flex;justify-content:flex-end">
                        <div id="pivot-legend" class="pivot-legend"></div>
                    </div>
                </div>
            </div>

            <!-- Driver chart (hidden until compare active) -->
            <div id="driver-chart-section" class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-6 hidden">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-base font-semibold text-gray-800">Driver Analysis</h2>
                    <span class="text-xs text-gray-400">Informal tornado</span>
                </div>
                <div id="driver-chart-container"></div>
            </div>

            <!-- Ball chart section -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-6">
                <div class="circle-diagram-container">
                    <div class="circle-diagram-header">
                        <div class="flex justify-between items-start">
                            <div>
                                <h2 id="ball-chart-title" class="text-base font-semibold text-gray-800">Ball Chart</h2>
                                <p id="ball-chart-subtitle" class="text-xs text-gray-400"></p>
                            </div>
                            <!-- Metric + settings: compact, right-aligned -->
                            <div class="bg-white/90 backdrop-blur-sm border border-gray-200/50 rounded-lg p-3 shadow-sm space-y-2 min-w-[180px]" style="pointer-events:auto">
                                <div class="text-xs text-gray-400 text-right uppercase tracking-wider cursor-pointer flex items-center justify-end" id="settings-header">
                                    <span>Metric</span>
                                    <i class="fas fa-chevron-down ml-1 text-[8px] transition-transform duration-200" id="settings-arrow"></i>
                                </div>
                                <select id="metric-selector" class="block w-full text-xs text-gray-700 bg-gray-50 border border-gray-200 rounded-md px-2 py-1.5 focus:ring-1 focus:ring-indigo-500 focus:border-transparent">
                                    <option value="bulkVolume">Bulk volume</option>
                                    <option value="netVolume">Net volume</option>
                                    <option value="poreVolume">Pore volume</option>
                                    <option value="hcpvOil">HCPV oil</option>
                                    <option value="hcpvGas">HCPV gas</option>
                                    <option value="stoiip" selected>STOIIP</option>
                                    <option value="giip">GIIP</option>
                                </select>
                                <div id="current-unit" class="text-xs text-gray-500 px-1"></div>

                                <div id="extended-settings" class="space-y-2 hidden">
                                    <label class="inline-flex items-center cursor-pointer text-xs text-gray-500">
                                        <input type="checkbox" id="show-values-toggle" class="sr-only peer">
                                        <div class="relative w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-500"></div>
                                        <span class="ml-1.5">Values</span>
                                    </label>
                                    <label class="inline-flex items-center cursor-pointer text-xs text-gray-500">
                                        <input type="checkbox" id="enable-zoom-toggle" class="sr-only peer">
                                        <div class="relative w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-500"></div>
                                        <span class="ml-1.5">Zoom</span>
                                    </label>
                                    <label class="inline-flex items-center cursor-pointer text-xs text-gray-500">
                                        <input type="checkbox" id="show-legend-toggle" class="sr-only peer">
                                        <div class="relative w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-indigo-500"></div>
                                        <span class="ml-1.5">Legend</span>
                                    </label>
                                    <div>
                                        <label class="text-xs text-gray-500">Depth</label>
                                        <div class="flex items-center gap-2">
                                            <input type="range" id="max-depth-slider" min="1" max="5" value="5" class="flex-1 h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                                            <span id="max-depth-value" class="text-xs text-gray-500 w-4 text-center">5</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Main diagram container -->
                    <div id="circle-diagram" class="w-full h-full">
                        <!-- Legend panel -->
                        <div class="circle-legend" id="circle-legend">
                            <div class="text-xs text-gray-400 mb-1.5 text-right uppercase tracking-wider legend-title-text">Legend</div>
                            <div class="mb-3 pb-3 border-b border-gray-100 flex items-center gap-2">
                                <div class="text-xs text-gray-500 min-w-fit" id="legend-layer-label">Layer 1</div>
                                <div class="slider-container flex-1">
                                    <input type="range" class="layer-slider w-full" id="legend-layer-slider" min="1" max="5" value="1" step="1">
                                </div>
                                <div class="text-xs text-gray-400 min-w-fit">5</div>
                            </div>
                            <div class="legend-items" id="legend-items"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cross-plot (collapsible) -->
            <button id="toggle-cross-plot" class="text-xs text-gray-400 hover:text-indigo-600 uppercase tracking-wider flex items-center mb-3 transition-colors">
                <span class="mr-1.5">Cross Plot</span>
                <i class="fas fa-chevron-down text-[10px]"></i>
            </button>
            <div id="cross-plot-outer-container" class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-6 hidden">
                <div class="flex justify-end mb-3">
                    <select id="cross-plot-grouping" class="text-xs bg-gray-50 border border-gray-200 rounded-md px-2 py-1 focus:ring-1 focus:ring-indigo-500"></select>
                </div>
                <div id="cross-plot" class="w-full h-[500px] relative"></div>
            </div>

            <!-- Timeline (collapsible) -->
            <button id="toggle-timeline" class="text-xs text-gray-400 hover:text-indigo-600 uppercase tracking-wider flex items-center mb-3 transition-colors">
                <span class="mr-1.5">Revision Timeline</span>
                <i class="fas fa-chevron-down text-[10px]"></i>
            </button>
            <div id="timeline-outer-container" class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-6 hidden">
                <div id="timeline-container"></div>
            </div>

            <!-- Export/Import (subtle, bottom) -->
            <div class="flex items-center gap-4 mb-8 opacity-50 hover:opacity-100 transition-opacity">
                <button id="export-json-btn" class="text-xs text-gray-400 hover:text-indigo-600 flex items-center gap-1 transition-colors">
                    <i class="fas fa-download text-[10px]"></i> Export
                </button>
                <button id="import-json-btn" class="text-xs text-gray-400 hover:text-indigo-600 flex items-center gap-1 transition-colors">
                    <i class="fas fa-upload text-[10px]"></i> Import
                </button>
                <input id="import-json-input" type="file" accept=".json" class="hidden">
            </div>
        </div>
    </div>

    <!-- ===== MODALS ===== -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center hidden z-50">

        <!-- Add Case Modal -->
        <div id="add-case-modal" class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-lg hidden">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-base font-semibold text-gray-800">Add New Volumetric Case</h3>
                <div id="timestamp-display" class="text-xs text-gray-400 cursor-pointer hover:text-indigo-600 transition-colors"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Field</label>
                    <select id="new-case-field" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors"></select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">Scenario</label>
                    <select id="new-case-scenario" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors"></select>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-medium text-gray-500 mb-1">Case Title</label>
                <input type="text" id="new-case-title" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Enter case title">
            </div>

            <div class="flex items-end gap-3 mb-4">
                <div class="flex-1">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Author</label>
                    <input type="text" id="new-case-author" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Enter author name">
                </div>
                <label class="inline-flex items-center cursor-pointer text-xs text-gray-500 pb-2">
                    <input type="checkbox" id="default-author-toggle" class="sr-only peer">
                    <div class="relative w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-gray-400"></div>
                    <span class="ml-1.5">Default</span>
                </label>
            </div>

            <div class="mb-4">
                <label class="block text-xs font-medium text-gray-500 mb-1">Description</label>
                <textarea id="new-case-description" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Optional description" rows="2"></textarea>
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-medium text-gray-500">Volumetric Data</label>
                    <label class="inline-flex items-center cursor-pointer text-xs text-gray-500">
                        <input type="checkbox" id="divide-by-1000-toggle" class="sr-only peer" checked>
                        <div class="relative w-8 h-4 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-gray-400"></div>
                        <span class="ml-1.5">Divide by 1000</span>
                    </label>
                </div>
                <textarea id="new-case-data" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent h-36 font-mono transition-colors" placeholder="Paste tab-separated data or copy from Excel..."></textarea>
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-medium text-gray-500">Volume Groups</label>
                    <span class="text-xs text-gray-400">For table and visualization grouping</span>
                </div>
                <div id="volume-group-container" class="space-y-2"></div>
                <div class="flex justify-end mt-2">
                    <button id="add-group-level" type="button" class="text-indigo-500 hover:text-indigo-700 text-xs flex items-center transition-colors">
                        <i class="fas fa-plus mr-1 text-[10px]"></i> Add Level
                    </button>
                </div>
            </div>

            <div class="mb-4 hidden" id="timestamp-picker-container">
                <label class="block text-xs font-medium text-gray-500 mb-1">Custom Timestamp</label>
                <input type="datetime-local" id="custom-timestamp" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors">
            </div>

            <div id="import-preview" class="mb-4"></div>

            <div class="flex justify-end gap-2 pt-2">
                <button id="cancel-add-case" class="px-4 py-2 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">Cancel</button>
                <button id="confirm-add-case" class="px-4 py-2 text-sm text-white bg-indigo-500 hover:bg-indigo-600 rounded-xl transition-colors">Add Case</button>
            </div>
        </div>

        <!-- Manage Fields Modal -->
        <div id="manage-fields-modal" class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-lg hidden">
            <h3 class="text-base font-semibold text-gray-800 mb-5">Manage Fields</h3>

            <div class="mb-4">
                <label class="block text-xs font-medium text-gray-500 mb-1">Fields</label>
                <ul id="field-list" class="border border-gray-200 rounded-xl max-h-60 overflow-y-auto bg-gray-50"></ul>
            </div>

            <div class="mb-5">
                <label class="block text-xs font-medium text-gray-500 mb-1">Add New Field</label>
                <div class="flex gap-2">
                    <input type="text" id="new-field-name" class="flex-1 block px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Enter field name">
                    <button id="add-field-btn" class="px-4 py-2 text-sm text-white bg-indigo-500 hover:bg-indigo-600 rounded-xl transition-colors">Add</button>
                </div>
            </div>

            <div class="flex justify-end">
                <button id="close-manage-fields" class="px-4 py-2 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">Close</button>
            </div>
        </div>

        <!-- Edit Case Modal -->
        <div id="rename-case-modal" class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-lg hidden">
            <h3 class="text-base font-semibold text-gray-800 mb-5">Edit Volumetric Case</h3>

            <div class="modal-content-scroll" style="max-height:calc(100vh - 200px);overflow-y:auto;padding-right:0.5rem;">
                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Case Title</label>
                    <input type="text" id="rename-case-title" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Enter case title">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Author</label>
                    <input type="text" id="edit-case-author" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Enter author name">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Description</label>
                    <textarea id="edit-case-description" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors" placeholder="Optional description" rows="2"></textarea>
                </div>

                <div class="mb-4">
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-medium text-gray-500">Volume Groups</label>
                        <span class="text-xs text-gray-400">For table and visualization grouping</span>
                    </div>
                    <div id="edit-volume-group-container" class="space-y-2"></div>
                    <div class="flex justify-end mt-2">
                        <button id="edit-add-group-level" type="button" class="text-indigo-500 hover:text-indigo-700 text-xs flex items-center transition-colors">
                            <i class="fas fa-plus mr-1 text-[10px]"></i> Add Level
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-medium text-gray-500">Value Conversions</label>
                        <span class="text-xs text-gray-400">Convert discrete column values</span>
                    </div>
                    <div id="edit-value-conversions-container" class="space-y-2"></div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Timestamp</label>
                    <input type="datetime-local" id="edit-timestamp" class="block w-full px-3 py-2 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:ring-1 focus:ring-indigo-500 focus:border-transparent transition-colors">
                </div>
            </div>

            <div class="flex justify-end gap-2 pt-4 mt-4 border-t border-gray-100">
                <button id="cancel-rename-case" class="px-4 py-2 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors">Cancel</button>
                <button id="confirm-rename-case" class="px-4 py-2 text-sm text-white bg-indigo-500 hover:bg-indigo-600 rounded-xl transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- App module -->
    <script type="module">
        import { init } from './app.js?v=3';
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
